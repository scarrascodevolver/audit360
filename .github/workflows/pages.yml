# Pages está en modo "GitHub Actions": construimos el mockup estático
# y lo publicamos como artefacto con deploy-pages. El repo ya no lleva
# el build committeado en la raíz.
name: Publicar mockup en Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build estático del mockup
        run: npx vite build --config vite.pages.config.js
        env:
          VITE_GH_PAGES: '1'

      - name: Renombrar la entrada a index.html
        run: mv dist/index.pages.html dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

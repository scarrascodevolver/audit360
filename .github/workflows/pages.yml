# Pages está en modo "Deploy from a branch" (main / root) y el token de
# Actions no puede cambiarlo, así que publicamos committeando el build
# compilado (index.html + assets/) a la raíz de main. [skip ci] evita
# que el commit del bot re-dispare este workflow.
name: Publicar mockup en Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build estático del mockup
        run: npx vite build --config vite.pages.config.js
        env:
          VITE_GH_PAGES: '1'

      - name: Copiar build a la raíz publicada
        run: |
          mv dist/index.pages.html dist/index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/index.html index.html
          touch .nojekyll

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          if git diff --cached --quiet; then
            echo "Build sin cambios, nada que publicar"
          else
            git commit -m "Publicar build del mockup [skip ci]"
            git push
          fi
